version: "3.9"

services:

  fastapi:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: ekip-fastapi-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    
  flask:
    build: ./ingestion
    container_name: ekip-flask-service
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant

  ui:
    build: ./ui
    container_name: ekip-ui
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_ENDPOINT=http://fastapi:8000/query/
    depends_on:
      - fastapi
      - flask

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ekip-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
      

volumes:
  qdrant_data:
